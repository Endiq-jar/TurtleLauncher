name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # Works whether gradlew lives at the repo root or one level down
      # (e.g. TurtleLauncher/gradlew) - no need to hardcode the layout.
      - name: Locate the Android project root
        id: locate
        run: |
          GRADLEW_PATH=$(find . -maxdepth 3 -name gradlew | head -n1)
          if [ -z "$GRADLEW_PATH" ]; then
            echo "::error::No gradlew found anywhere in this repo (checked 3 levels deep)."
            exit 1
          fi
          PROJECT_DIR=$(dirname "$GRADLEW_PATH")
          echo "dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"
          echo "Found Android project at: $PROJECT_DIR"

          PROPS="$PROJECT_DIR/gradle/wrapper/gradle-wrapper.properties"
          if [ -f "$PROPS" ]; then
            VERSION=$(grep -oE 'gradle-[0-9.]+-(bin|all)' "$PROPS" | head -n1 | sed -E 's/gradle-([0-9.]+)-(bin|all)/\1/')
          fi
          VERSION=${VERSION:-8.9}
          echo "gradle_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Target Gradle version: $VERSION"

      # Fixes: "Could not find or load main class org.gradle.wrapper.GradleWrapperMain"
      # That error means gradle/wrapper/gradle-wrapper.jar is missing, empty, or corrupt
      # in the repo - common with GitHub's web "Add files via upload" flow, which can
      # silently drop or mangle binary files. Rather than debug how it got lost, this
      # provisions a real Gradle install and has it write a fresh, correct wrapper jar
      # before gradlew is ever invoked, so the build no longer depends on whatever
      # actually made it into the repo.
      - name: Provision Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: ${{ steps.locate.outputs.gradle_version }}

      - name: Regenerate the Gradle wrapper jar
        working-directory: ${{ steps.locate.outputs.dir }}
        run: gradle wrapper --gradle-version ${{ steps.locate.outputs.gradle_version }}

      # The Termux build pins aapt2 to a Termux-only ARM64 binary path that doesn't
      # exist on a normal Linux runner. Strip it so AGP falls back to the standard
      # aapt2 pulled from Google's Maven repo. Harmless no-op if the line isn't there.
      - name: Remove Termux-only aapt2 override
        run: sed -i '/android.aapt2FromMavenOverride/d' "${{ steps.locate.outputs.dir }}/gradle.properties" || true

      - name: Grant execute permission to gradlew
        run: chmod +x "${{ steps.locate.outputs.dir }}/gradlew"

      - name: Build debug APK
        working-directory: ${{ steps.locate.outputs.dir }}
        env:
          CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
        run: ./gradlew :ZalithLauncher:assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: TurtleLauncher-debug-apk
          path: "**/build/outputs/apk/debug/*.apk"
